<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>C2D TERA</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, Helvetica, sans-serif;
    }

    body{
        width:100%;
        height:100vh;
        overflow:hidden;
        background:black;
        display:flex;
        justify-content:center;
        align-items:center;
        position:relative;
    }

    /* Uzay Arkaplan */
    body::before{
        content:"";
        position:absolute;
        width:100%;
        height:100%;
        background:url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?q=80&w=1920&auto=format&fit=crop') center/cover no-repeat;
        filter:brightness(0.5);
        z-index:-2;
    }

    /* Yıldız Efekti */
    body::after{
        content:"";
        position:absolute;
        width:100%;
        height:100%;
        background-image:
        radial-gradient(white 1px, transparent 1px),
        radial-gradient(white 1px, transparent 1px);
        background-size:50px 50px;
        background-position:0 0, 25px 25px;
        opacity:0.4;
        animation:stars 20s linear infinite;
        z-index:-1;
    }

    @keyframes stars{
        from{
            transform:translateY(0);
        }
        to{
            transform:translateY(-100px);
        }
    }

    h1{
        color:#00bfff;
        font-size:90px;
        text-align:center;
        letter-spacing:8px;
        text-shadow:
            0 0 10px #00bfff,
            0 0 20px #00bfff,
            0 0 40px #00bfff,
            0 0 80px #00bfff;
        animation:glitch 1s infinite;
    }

    @keyframes glitch{
        0%{
            transform:translate(0);
        }
        20%{
            transform:translate(-2px,2px);
        }
        40%{
            transform:translate(-2px,-2px);
        }
        60%{
            transform:translate(2px,2px);
        }
        80%{
            transform:translate(2px,-2px);
        }
        100%{
            transform:translate(0);
        }
    }

    .line{
        position:absolute;
        width:100%;
        height:2px;
        background:#00bfff;
        box-shadow:0 0 10px #00bfff;
    }

    .line.top{
        top:35%;
    }

    .line.bottom{
        bottom:35%;
    }
</style>
</head>

<body>

<div class="line top"></div>

<h1>HACKED BY C2D TERA</h1>

<div class="line bottom"></div>

</body>
</html>
