<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C2D HACK TEAM</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background:white;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            overflow:hidden;
        }

        .logo{
            width:350px;
            max-width:90%;
            animation: glow 2s infinite alternate;
        }

        h1{
            margin-top:30px;
            color:#8b0000;
            font-size:38px;
            text-align:center;
            letter-spacing:3px;
            text-shadow:0 0 10px rgba(139,0,0,0.5);
        }

        @keyframes glow{
            from{
                transform:scale(1);
            }
            to{
                transform:scale(1.05);
            }
        }
    </style>
</head>
<body>

    <!-- LOGO -->
    <img src="1000009481.jpg" alt="" class="logo">

    <!-- YAZI -->
    <h1>C2D HACK TEAM BY HACKED</h1>

</body>
</html>
